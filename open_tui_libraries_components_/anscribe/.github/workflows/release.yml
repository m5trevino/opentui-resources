name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  release:
    name: Release
    # Prevent forks from publishing.
    if: github.repository == 'msmps/anscribe'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # commit version bumps and create the release PR
      pull-requests: write # open/update the changesets release PR
      id-token: write # OIDC for npm provenance attestations
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Upgrade npm for OIDC / provenance support
        run: npm install -g npm@latest
      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

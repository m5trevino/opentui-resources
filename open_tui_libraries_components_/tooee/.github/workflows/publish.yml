name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@11.11.0

      - run: bun install

      - run: bun run build

      - run: bun test

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Verify package versions match tag
        run: |
          PKG_VERSION=$(node -p "require('./packages/config/package.json').version")
          if [[ "$PKG_VERSION" != "$VERSION" ]]; then
            echo "Error: tag $GITHUB_REF_NAME but packages/config has version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Pack and publish packages
        run: |
          PACKAGES=(
            packages/config
            packages/commands
            packages/clipboard
            packages/fuzzy
            packages/marks
            packages/search
            packages/router
            packages/overlays
            packages/themes
            packages/toasts
            packages/layout
            packages/renderers
            packages/shell
            packages/view
            packages/ask
            packages/choose
            apps/cli
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "Publishing $pkg..."
            cd "$pkg"

            # Skip if already published (partial-publish recovery)
            PKG_NAME=$(node -p "require('./package.json').name")
            if npm view "$PKG_NAME@$VERSION" version &>/dev/null; then
              echo "  $PKG_NAME@$VERSION already published, skipping"
              cd "$GITHUB_WORKSPACE"
              continue
            fi

            bun pm pack --quiet
            TARBALL=$(ls *.tgz)
            npm publish "$TARBALL" --provenance --access public
            rm -f "$TARBALL"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

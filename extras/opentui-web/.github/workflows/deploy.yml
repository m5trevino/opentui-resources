name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; cancel in-progress runs if a new push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain (zig / node / bun) via mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # pnpm version comes from packageManager in root package.json
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM artifact
        run: pnpm build:wasm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build web-demo
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm --filter web-demo build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web-demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' src-rust/Cargo.toml | head -n1)
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG does not match src-rust/Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Build Rust release binary
        run: cargo build --release --manifest-path src-rust/Cargo.toml --target ${{ matrix.target }}

      - name: Package release archive
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TARGET="${{ matrix.target }}"
          STAGE="dist/lazymem-v${VERSION}-${TARGET}"

          mkdir -p "$STAGE/bin" "$STAGE/skill"
          cp "src-rust/target/${TARGET}/release/lazymem" "$STAGE/bin/lazymem"
          cp README.md LICENSE "$STAGE/"
          cp skill/SKILL.md "$STAGE/skill/SKILL.md"

          tar -C dist -czf "lazymem-v${VERSION}-${TARGET}.tar.gz" "lazymem-v${VERSION}-${TARGET}"
          shasum -a 256 "lazymem-v${VERSION}-${TARGET}.tar.gz" > "lazymem-v${VERSION}-${TARGET}.tar.gz.sha256"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            lazymem-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            lazymem-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: true
          overwrite_files: true

  update-homebrew:
    needs: build-release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Collect release metadata
        id: release
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"
          ARM_URL="${BASE_URL}/lazymem-v${VERSION}-aarch64-apple-darwin.tar.gz"
          X86_URL="${BASE_URL}/lazymem-v${VERSION}-x86_64-apple-darwin.tar.gz"

          fetch_sha() {
            url="$1"
            for attempt in 1 2 3 4 5 6; do
              sha=$(curl -fsSL --retry 5 --retry-delay 2 "${url}.sha256" | awk '{print $1}') && [ -n "$sha" ] && {
                printf '%s\n' "$sha"
                return 0
              }
              sleep 5
            done
            echo "::error::Failed to fetch checksum from ${url}.sha256" >&2
            return 1
          }

          ARM_SHA=$(fetch_sha "$ARM_URL")
          X86_SHA=$(fetch_sha "$X86_URL")

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "arm_url=$ARM_URL" >> "$GITHUB_OUTPUT"
          echo "arm_sha=$ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_url=$X86_URL" >> "$GITHUB_OUTPUT"
          echo "x86_sha=$X86_SHA" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: JayFarei/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cat > Formula/lazymem.rb <<'EOF'
          class Lazymem < Formula
            desc "Terminal UI memory monitor for macOS dev environments"
            homepage "https://github.com/JayFarei/lazymem"
            license "MIT"
            version "${{ steps.release.outputs.version }}"

            on_macos do
              if Hardware::CPU.arm?
                url "${{ steps.release.outputs.arm_url }}"
                sha256 "${{ steps.release.outputs.arm_sha }}"
              else
                url "${{ steps.release.outputs.x86_url }}"
                sha256 "${{ steps.release.outputs.x86_sha }}"
              end
            end

            def install
              bin.install "bin/lazymem"
              pkgshare.install "README.md", "LICENSE"
              pkgshare.install "skill"
            end

            test do
              assert_match "lazymem v#{version}", shell_output("#{bin}/lazymem --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lazymem.rb
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "lazymem v${{ steps.release.outputs.version }}"
          git push

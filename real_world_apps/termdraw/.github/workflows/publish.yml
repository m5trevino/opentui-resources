name: Publish packages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish
        required: true
        default: main
      package:
        description: Package to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - opentui
          - app
          - pi

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      SKIP_INSTALL_SIMPLE_GIT_HOOKS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify workspace
        run: bun run check

      - name: Verify publishable package contents
        run: bun run pack:check

      - name: Publish selected packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_package() {
            local package_dir="$1"
            echo "Publishing ${package_dir}"
            (cd "${package_dir}" && npm publish --access public --provenance)
          }

          case "${{ inputs.package }}" in
            opentui)
              publish_package packages/opentui
              ;;
            app)
              publish_package packages/app
              ;;
            pi)
              publish_package packages/pi
              ;;
            all)
              publish_package packages/opentui
              publish_package packages/app
              publish_package packages/pi
              ;;
          esac
